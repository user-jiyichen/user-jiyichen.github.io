---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <script>
      // Apply saved theme before page renders to prevent flash
      (function() {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark-theme-pending');
        }
      })();
    </script>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      // Apply dark theme class to body (moves it from html to body)
      (function() {
        if (document.documentElement.classList.contains('dark-theme-pending')) {
          document.documentElement.classList.remove('dark-theme-pending');
          document.body.classList.add('dark-theme');
        }
      })();

      // Toggle button logic
      var toggleBtn = document.getElementById('dark-mode-toggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
          document.body.classList.toggle('dark-theme');
          var isDark = document.body.classList.contains('dark-theme');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      }
    </script>

  </body>
</html>
