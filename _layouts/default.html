---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <script>
      // Apply saved theme before page renders to prevent flash
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark-theme');
        }
      })();
    </script>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

  <script>
  (function() {
    var STORAGE_KEY = "theme";
    var ROOT = document.documentElement;
    var TOGGLE_SELECTOR = ".dark-mode-toggle";

    function persistTheme(isDark) {
      try {
        localStorage.setItem(STORAGE_KEY, isDark ? "dark" : "light");
      } catch (e) {
        // Ignore storage errors (private mode / restricted contexts).
      }
    }

    function setTheme(isDark) {
      ROOT.classList.toggle("dark-theme", isDark);
      persistTheme(isDark);
    }

    function toggleTheme() {
      setTheme(!ROOT.classList.contains("dark-theme"));
    }

    function isActivationKey(event) {
      return event.key === "Enter" || event.key === " " || event.key === "Spacebar";
    }

    function consumeToggleEvent(event, toggleEl) {
      event.preventDefault();
      event.stopPropagation();
      if (typeof event.stopImmediatePropagation === "function") {
        event.stopImmediatePropagation();
      }
      if (toggleEl) {
        toggleEl.blur();
      }
      toggleTheme();
    }

    function handleCaptureClick(event) {
      var target = event.target;
      if (!target || !(target instanceof Element)) return;
      var toggleEl = target.closest(TOGGLE_SELECTOR);
      if (!toggleEl) return;
      consumeToggleEvent(event, toggleEl);
    }

    function handleCaptureKeydown(event) {
      var target = event.target;
      if (!target || !(target instanceof Element)) return;
      var toggleEl = target.closest(TOGGLE_SELECTOR);
      if (!toggleEl || !isActivationKey(event)) return;
      consumeToggleEvent(event, toggleEl);
    }

    document.addEventListener("click", handleCaptureClick, true);
    document.addEventListener("keydown", handleCaptureKeydown, true);

    window.toggleDarkMode = toggleTheme;
  })();
  </script>

  </body>
</html>
